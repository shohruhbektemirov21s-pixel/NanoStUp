# Render Blueprint — NanoStUp
# DATABASE_URL ni qo'lda kiritamiz (DB allaqachon yaratilgan)

services:
  # Backend (Django)
  - type: web
    name: nanostup-api
    runtime: python
    rootDir: backend
    region: frankfurt
    plan: standard  # $25/oy, 2GB RAM — free plan uyquga ketadi!
    branch: main
    buildCommand: "./build.sh"
    # --timeout 180: Claude/Gemini AI so'rovlari 30-120s olishi mumkin
    # --workers 3: standard plan 2GB RAM uchun (2*CPU+1 formulasi)
    # --graceful-timeout 30: worker restart paytida so'rovlarni yakunlash
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 3 --timeout 180 --graceful-timeout 30 --keep-alive 5 --access-logfile - --error-logfile -"
    envVars:
      - key: DATABASE_URL
        sync: false  # Qo'lda kiritamiz (dashboard orqali)
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "nanostup-api.onrender.com,nanostup.uz,www.nanostup.uz"
      - key: DEBUG
        value: "False"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://nanostup.onrender.com,https://nanostup.uz,https://www.nanostup.uz"
      - key: DJANGO_SETTINGS_MODULE
        value: "config.settings.production"
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: ANTHROPIC_MODEL
        value: "claude-3-5-sonnet-latest"
      - key: GOOGLE_GENERATIVE_AI_MODEL
        value: "gemini-2.0-flash"

  # Frontend (Next.js)
  - type: web
    name: nanostup
    runtime: node
    rootDir: frontend
    region: frankfurt
    plan: free
    branch: main
    buildCommand: "npm install && npm run build"
    startCommand: "npm run start"
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: "https://nanostup-api.onrender.com"
      - key: NODE_VERSION
        value: "20.10.0"
