# Render Blueprint — NanoStUp
# Databases alohida `databases:` bo'limida bo'lishi kerak

databases:
  - name: nanostup-db
    plan: basic-256  # $6/oy, 1GB storage
    region: frankfurt
    postgresMajorVersion: "16"

services:
  # Backend (Django)
  - type: web
    name: nanostup-api
    runtime: python
    rootDir: backend
    region: frankfurt
    plan: standard  # $25/oy, 2GB RAM
    branch: main
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nanostup-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "nanostup-api.onrender.com"
      - key: DEBUG
        value: "False"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://nanostup.onrender.com"
      - key: DJANGO_SETTINGS_MODULE
        value: "config.settings.production"
      - key: PYTHON_VERSION
        value: "3.12.0"

  # Frontend (Next.js)
  - type: web
    name: nanostup
    runtime: node
    rootDir: frontend
    region: frankfurt
    plan: free
    branch: main
    buildCommand: "npm install && npm run build"
    startCommand: "npm run start"
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: "https://nanostup-api.onrender.com"
      - key: NODE_VERSION
        value: "20.10.0"
