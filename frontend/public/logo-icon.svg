<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 90 90" fill="none">
  <defs>
    <linearGradient id="hexGrad" x1="0" y1="0" x2="90" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4DB8F5"/>
      <stop offset="100%" stop-color="#1A2F8A"/>
    </linearGradient>
    <linearGradient id="nGrad" x1="0" y1="0" x2="90" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#93D5F8"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </linearGradient>
  </defs>
  <!-- Flat-top hexagon outline -->
  <polygon
    points="26,6 64,6 84,42 64,78 26,78 6,42"
    stroke="url(#hexGrad)"
    stroke-width="5"
    stroke-linejoin="round"
    fill="none"
  />
  <!-- N letter inside -->
  <path
    d="M29 65 L29 27 L55 61 L55 27"
    stroke="url(#nGrad)"
    stroke-width="6"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
  <line x1="55" y1="27" x2="55" y2="65" stroke="url(#nGrad)" stroke-width="6" stroke-linecap="round"/>
  <!-- Circuit dots left side -->
  <circle cx="10" cy="30" r="3.5" fill="#4DB8F5"/>
  <circle cx="4"  cy="42" r="3"   fill="#4DB8F5"/>
  <circle cx="10" cy="54" r="3.5" fill="#4DB8F5"/>
  <line x1="10" y1="30" x2="6"  y2="42" stroke="#4DB8F5" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="6"  y1="42" x2="10" y2="54" stroke="#4DB8F5" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="10" y1="30" x2="10" y2="54" stroke="#4DB8F5" stroke-width="1" stroke-dasharray="2.5 3" opacity="0.5"/>
</svg>
